spring.application.name=elite-performance-api

spring.datasource.url=jdbc:mysql://localhost:3306/elite_performance?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

app.jwt.secret=change-this-development-secret-key-32-bytes-minimum
app.jwt.expiration-minutes=120

server.error.include-message=always
